<!DOCTYPE html>
<html>

<head>
<title>Add Two Numbers</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    display:block;
    width:200px;
    margin:10px auto;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    color:green;
    font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Two Numbers</h2>

<input type="number" id="num1" placeholder="Enter first number">

<input type="number" id="num2" placeholder="Enter second number">

<button onclick="addNumbers()">Add</button>

<h3 id="result"></h3>

</div>

<script>

function addNumbers(){

let num1 = document.getElementById("num1").value;
let num2 = document.getElementById("num2").value;

num1 = Number(num1);
num2 = Number(num2);

let sum = num1 + num2;

document.getElementById("result").innerHTML = "Result: " + sum;

}

</script>

</body>
</html>
